services:
  postgres:
    image: postgres:15-alpine
    container_name: parque-db-prod
    restart: always
    environment:
      POSTGRES_USER: disney_user
      POSTGRES_PASSWORD: disney_pass_2026
      POSTGRES_DB: disney_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - parque-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disney_user -d disney_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Backend - API Ruby/Sinatra (Produção)
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        RACK_ENV: production
    container_name: parque-api-prod
    restart: always
    ports:
      - "4567:4567"
    environment:
      - RACK_ENV=production
      - DATABASE_URL=postgresql://disney_user:disney_pass_2026@postgres:5432/disney_db
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: sh -c "ruby seed.rb && ruby app.rb -o 0.0.0.0"
    networks:
      - parque-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4567/api/atracao"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend - React/Vite (Produção)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: http://localhost:4567
    container_name: parque-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:4567
    depends_on:
      api:
        condition: service_healthy
    networks:
      - parque-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  parque-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
